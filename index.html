<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prism AI</title>

  <script>
    (function () {
      var pendingMessages = [];

      function renderDebugMessages() {
        var panel = document.getElementById("debugPanel");
        if (!panel || !pendingMessages.length) return;

        panel.hidden = false;
        panel.style.display = "block";
        panel.textContent = pendingMessages.join("\n\n");
      }

      function formatError(message, source, lineno, colno, error) {
        var parts = [];
        if (message) parts.push(String(message));
        if (source) parts.push("Source: " + source);
        if (lineno) parts.push("Line: " + lineno + (colno ? ":" + colno : ""));
        if (error && error.stack) parts.push(error.stack);
        return parts.join("\n");
      }

      window.showDebugMessage = function (message) {
        var text = String(message || "Unknown error");
        pendingMessages.push(text);
        renderDebugMessages();
      };

      window.onerror = function (message, source, lineno, colno, error) {
        window.showDebugMessage("JavaScript error:\n" + formatError(message, source, lineno, colno, error));
        return false;
      };

      window.onunhandledrejection = function (event) {
        var reason = event && event.reason;
        var detail = reason && reason.stack ? reason.stack : reason;
        window.showDebugMessage("JavaScript promise error:\n" + String(detail || "Unhandled promise rejection"));
      };

      document.addEventListener("DOMContentLoaded", function () {
        renderDebugMessages();
      });
    })();
  </script>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- SPLASH SCREEN -->
  <div id="splash">
    <div class="logo">Prism AI</div>
    <p>Watch. Learn. Earn.</p>
  </div>

  <!-- APP -->
  <div id="app">
    <!-- TOP BAR -->
    <div class="topbar">
      <div class="brand">Prism AI</div>
      <button id="loginBtn" type="button" disabled>Login</button>
    </div>

    <div
      id="debugPanel"
      role="status"
      aria-live="polite"
      hidden
      style="display: none; white-space: pre-wrap; background: #7f1d1d; color: #ffffff; padding: 10px; font: 13px/1.4 Arial, sans-serif; max-height: 160px; overflow: auto;"
    ></div>

    <!-- FEED -->
    <div class="feed" id="feed"></div>

    <div class="modal-backdrop" id="uploadModal" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="uploadModalTitle">
        <div class="modal-header">
          <h2 id="uploadModalTitle">Create Post</h2>
          <button type="button" class="modal-close" id="uploadCloseBtn" aria-label="Close upload form">×</button>
        </div>
        <form id="uploadForm">
          <div class="upload-tabs">
            <button type="button" class="tab-btn active" data-tab="phone">📱 Phone</button>
            <button type="button" class="tab-btn" data-tab="youtube">▶️ YouTube</button>
          </div>

          <div id="phone-tab" class="tab-content active">
            <label for="uploadTitle">Title</label>
            <input id="uploadTitle" name="title" type="text" required />

            <label for="uploadCreator">Creator</label>
            <input id="uploadCreator" name="creator" type="text" required />

            <label for="uploadVideo">Select Video File</label>
            <input id="uploadVideo" name="video_file" type="file" accept="video/*" />
            <small>Supported: MP4, WebM, MOV (max 50MB)</small>
          </div>

          <div id="youtube-tab" class="tab-content">
            <label for="uploadTitle2">Title</label>
            <input id="uploadTitle2" name="title2" type="text" />

            <label for="uploadCreator2">Creator</label>
            <input id="uploadCreator2" name="creator2" type="text" />

            <label for="uploadUrl">YouTube URL</label>
            <input id="uploadUrl" name="video_url" type="url" placeholder="https://www.youtube.com/watch?v=..." />
          </div>

          <div class="modal-actions">
            <button type="submit" id="uploadSubmitBtn">Upload</button>
            <button type="button" id="uploadCancelBtn">Cancel</button>
          </div>
          <div id="uploadProgress" class="upload-progress" style="display: none;">
            <div class="progress-bar">
              <div id="progressFill" class="progress-fill"></div>
            </div>
            <p id="progressText">Uploading...</p>
          </div>
        </form>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottombar">
      <div class="nav-item" data-nav="home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </div>
      <div class="nav-item" data-nav="hot">
        <span class="nav-icon">🔥</span>
        <span class="nav-label">Hot</span>
      </div>
      <button id="uploadBtn" type="button" class="nav-create">
        <span class="create-icon">+</span>
      </button>
      <div class="nav-item" data-nav="me">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Me</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
